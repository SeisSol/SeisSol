name: pytest-python

on:
  push:

jobs:
  pytest:
    name: pytest-${{ matrix.python-version }}
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: checkout-seissol
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: install-test-deps
        run: |
          python -m pip install --upgrade pip
          # Runtime deps for the tested code
          pip install numpy pandas scipy setuptools lxml seissolxdmf h5py
          # Test framework
          pip install pytest pytest-cov hypothesis

          # (not needed and disabled; kept for completeness)
          # Install yateto from the checked-out submodule so codegen
          # integration tests can actually construct ADERDG instances.
          # pip install -e ./submodules/yateto

      - name: run-pytest
        working-directory: tests/python
        run: |
          python -m pytest -v --tb=short \
                 --cov=../../codegen \
                 --cov=../../postprocessing/validation \
                 --cov=../../.ci \
                 --cov-report=xml \
                 --cov-report=term-missing \
                 --cov-branch

      - name: upload-coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: tests/python/coverage.xml
