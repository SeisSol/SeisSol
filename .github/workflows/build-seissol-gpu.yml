name: build-seissol-gpu
on:
  - push

env:
  precomputed-hash: a8a82bc23a921d22c257eab6f70a17e1e0f49b60

jobs:
  seissol-build-test:
    name: seissol-build-test<${{matrix.setup.cc}}, ${{matrix.setup.backend}}, ${{matrix.setup.arch}}, ${{matrix.build_type}}>
    runs-on: ubuntu-26.04
    container: ${{ matrix.setup.container }}
    continue-on-error: true
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        precision:
          - single
        arch:
          - hsw
        build_type:
          - Release
          #- Debug
        setup:
          - arch: sm_60
            backend: cuda
            cc: gcc-13
            cxx: g++-13
            fc: gfortran-13
            container: seissol/gha-gpu-nv:davschneller-gpu-image
            runner: ubuntu-26.04
            pythonbreak: true
          - arch: sm_60
            backend: cuda
            cc: clang-18
            cxx: clang++-18
            fc: gfortran-13 # TODO?
            container: seissol/gha-gpu-nv:davschneller-gpu-image
            runner: ubuntu-26.04
            pythonbreak: true
          - arch: gfx906
            backend: hip
            cc: gcc-13
            cxx: g++-13
            fc: gfortran-13
            container: seissol/gha-gpu-amd:davschneller-gpu-image
            runner: ubuntu-26.04
            pythonbreak: true
          - arch: gfx906
            backend: hip
            cc: clang-18
            cxx: clang++-18
            fc: gfortran-13 # TODO?
            container: seissol/gha-gpu-amd:davschneller-gpu-image
            runner: ubuntu-26.04
            pythonbreak: true
          - arch: skl
            backend: oneapi
            cc: icx
            cxx: icpx
            fc: ifx
            container: seissol/gha-gpu-intel:davschneller-gpu-image
            runner: ubuntu-26.04
            pythonbreak: false
    env:
      cc: ${{matrix.setup.cc}}
      cxx: ${{matrix.setup.cxx}}
      fc: ${{matrix.setup.fc}}
      hostarch: ${{matrix.arch}}
      buildtype: ${{matrix.build_type}}
      tests: OFF
      devicearch: ${{matrix.setup.arch}}
      devicebackend: ${{matrix.setup.backend}}
    steps:
      - name: setup
        run: |
          if [ "${{ matrix.setup.pythonbreak }}" = false ]; then
            # the Intel image still works with an older Python version. Hence, use the following hack.
            pip3 install pyyaml
            git clone https://github.com/seissol/tensorforge.git
            export PYTHONPATH=$(pwd)/tensorforge:$PYTHONPATH
            export CMAKE_PREFIX_PATH=$(python3 -c 'import tensorforge; tensorforge.print_cmake_path()'):$CMAKE_PREFIX_PATH
          else
            pip3 install --break-system-packages git+https://github.com/seissol/tensorforge.git
          fi

      - name: checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/seissol-build
        name: elastic-s-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: elastic
          cfg-mechanisms: 0
          cfg-precision: single
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: viscoelastic-3-s-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: viscoelastic2
          cfg-mechanisms: 3
          cfg-precision: single
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: anisotropic-s-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: anisotropic
          cfg-mechanisms: 0
          cfg-precision: single
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: acoustic-s-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: acoustic
          cfg-mechanisms: 0
          cfg-precision: single
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: elastic-s-p3-f32
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 3
          cfg-equation: elastic
          cfg-mechanisms: 0
          cfg-precision: single
          cfg-simulations: 32

      - name: upload-seissol
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: seissol-${{matrix.build_type}}-${{matrix.setup.arch}}-${{matrix.setup.backend}}-${{matrix.setup.cc}}
          path: /opt/seissol

  seissol-run-test:
    name: seissol-run-test<${{matrix.setup.cc}}, ${{matrix.setup.backend}}, ${{matrix.setup.arch}}, ${{matrix.build_type}}>
    runs-on: ${{matrix.setup.container-runner}}
    container:
      image: ${{ matrix.setup.container }}
      options: ${{ matrix.setup.container-options || ' ' }}
    continue-on-error: true
    needs: [seissol-build-test]
    if: ${{ github.repository == 'SeisSol/SeisSol' }}
    strategy:
      fail-fast: false
      matrix:
        precision:
          - single
        arch:
          - hsw
        build_type:
          - Release
        setup:
          - arch: sm_60
            backend: cuda
            cc: gcc-13
            cxx: g++-13
            fc: gfortran-13
            container: seissol/gha-gpu-nv:davschneller-gpu-image
            pythonbreak: true
            ompi: true
            container-options: --runtime=nvidia --gpus=all
            container-runner: self-hosted
          - arch: sm_60
            backend: cuda
            cc: clang-18
            cxx: clang++-18
            fc: gfortran-13 # TODO?
            container: seissol/gha-gpu-nv:davschneller-gpu-image
            pythonbreak: true
            ompi: true
            container-options: --runtime=nvidia --gpus=all
            container-runner: self-hosted
        parallel:
          - ranks: 1
            threads: 4
            commthread: false
          #- ranks: 4
          #  threads: 1
          #  commthread: false
    steps:
      - name: install-packages
        run: |
          # circumvent problems with the Intel image still using Ubuntu 22.04
          if [ "${{ matrix.setup.pythonbreak }}" = true ]; then
            pip3 install --break-system-packages numpy>=1.12.0 lxml==5.0.0 setuptools seissolxdmf pandas jq
          else
            pip3 install numpy>=1.12.0 lxml==5.0.0 setuptools seissolxdmf pandas jq
          fi

      - name: get-precomputed-solutions
        uses: actions/checkout@v6
        with:
          repository: seissol/precomputed-seissol
          ref: ${{ env.precomputed-hash }}
          path: precomputed

      # The compare-*.py / verify.py scripts live in this very repo. The
      # workflow itself doesn't auto-checkout, so we do it explicitly here.
      - name: get-verification-scripts
        uses: actions/checkout@v6
        with:
          path: scripts

      - name: get-seissol
        id: get-seissol
        uses: actions/download-artifact@v8
        with:
          name: seissol-${{matrix.build_type}}-${{matrix.setup.arch}}-${{matrix.setup.backend}}-${{matrix.setup.cc}}
          path: install

      - name: verify
        id: verify
        run: |
          if [ ${{ matrix.setup.mpi }} = openmpi ]; then
            MPI_OPTIONS="--oversubscribe --allow-run-as-root -bind-to none"
          elif [ ${{ matrix.setup.mpi }} = intel ]; then
            MPI_OPTIONS=""
          fi

          export PATH=$(pwd)/install/bin:$PATH
          export LD_LIBRARY_PATH=$(pwd)/install/lib:$(pwd)/install/lib64:${LD_LIBRARY_PATH:-}
          chmod +x $(pwd)/install/bin/*

          export OMP_NUM_THREADS=${{ matrix.parallel.threads }}
          export SEISSOL_COMMTHREAD=${{ matrix.parallel.commthread }}
          export SEISSOL_MINI_NUM_ELEMENTS=100

          export OMPI_ALLOW_RUN_AS_ROOT=1
          export OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
          export OMPI_MCA_rmaps_base_oversubscribe=true

          python3 $GITHUB_WORKSPACE/scripts/postprocessing/validation/verify.py \
            --precomputed-dir precomputed \
            --binary-dir $GITHUB_WORKSPACE/install \
            --all \
            --mpi-cmd mpirun \
            --mpi-args "${MPI_OPTIONS}" \
            --ranks ${{ matrix.parallel.ranks }} \
            --threads ${{ matrix.parallel.threads }} \
            --color always \
            --report report.txt

      - name: upload-report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: report-${{ matrix.setup.cc }}-r${{ matrix.parallel.ranks }}t${{ matrix.parallel.threads }}
          path: report.txt
          if-no-files-found: ignore
