name: build-seissol-cpu
on:
  - push

env:
  precomputed-hash: 0f623b3e263726bc547997ca29790936396847df

jobs:
  # ---------------------------------------------------------------------------
  # Derive the per-case test matrix from precomputed-seissol/cases.json so the
  # only place we list cases is cases.json itself. Emits one matrix entry per
  # (case-name, precision) pair, carrying along the fields needed to download
  # the matching build artifact.
  # ---------------------------------------------------------------------------
  compute-cases:
    name: compute-cases
    runs-on: ubuntu-24.04
    outputs:
      cases: ${{ steps.gen.outputs.cases }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: seissol/precomputed-seissol
          ref: ${{ env.precomputed-hash }}
          path: precomputed

      - id: gen
        shell: python
        run: |
          import json, os, re

          # Parses display-config strings as used in cases.json, e.g.:
          #   "elastic-p6-f64"          -> {equation: elastic, prec: 64, multisim: 1}
          #   "viscoelastic-3-p6-f64"   -> {equation: viscoelastic2, mech: 3, prec: 64, multisim: 1}
          #   "elastic-p6-f64-s8"       -> {equation: elastic, prec: 64, multisim: 8}
          CONFIG_RE = re.compile(
              r"^(?P<eq>acoustic|elastic|anisotropic|poroelastic|viscoelastic)"
              r"(?:-(?P<mech>\d+))?"
              r"-p(?P<order>\d+)"
              r"-f(?P<prec>32|64)"
              r"(?:-s(?P<multisim>\d+))?$"
          )

          # Display name -> CMake EQUATIONS value (matches build matrix below).
          EQ_TO_CMAKE = {
              "acoustic": "acoustic",
              "elastic": "elastic",
              "anisotropic": "anisotropic",
              "poroelastic": "poroelastic",
              "viscoelastic": "viscoelastic2",
          }

          cases = json.load(open("precomputed/cases.json"))
          entries = []
          for key, entry in cases.items():
              name, precision = key.split("/", 1)
              m = CONFIG_RE.match(entry["config"])
              if not m:
                  raise ValueError(f"Cannot parse config string: {entry['config']!r}")
              entries.append({
                  "name": name,
                  "precision": precision,
                  "equation": EQ_TO_CMAKE[m["eq"]],
                  "multisim": int(m["multisim"]) if m["multisim"] else 1,
              })

          entries.sort(key=lambda x: (x["name"], x["precision"]))
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"cases={json.dumps({'include': entries})}\n")
          print(f"emitted {len(entries)} case entries")

  # ---------------------------------------------------------------------------
  # Build SeisSol once per (equation, precision, fused, compiler) tuple.
  # Unchanged compared to the previous workflow.
  # ---------------------------------------------------------------------------
  seissol-build-test:
    name: seissol-build-test<${{matrix.setup.name}}, ${{matrix.arch}}, ${{matrix.build_type}}>
    runs-on: ubuntu-24.04
    container: ${{ matrix.setup.container }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        arch:
          - hsw
        build_type:
          - Release
          #- Debug
        setup:
          - cc: gcc-13
            cxx: g++-13
            fc: gfortran-13
            container: seissol/gha-cpu:davschneller-gpu-image
            name: gcc-13
          - cc: clang-19
            cxx: clang++-19
            fc: gfortran-13 # TODO?
            container: seissol/gha-cpu:davschneller-gpu-image
            name: clang-19
          - cc: icx
            cxx: icpx
            fc: ifx
            container: seissol/gha-gpu-intel:davschneller-gpu-image
            name: icx-2024
          #- cc: nvc
          #  cxx: nvc++
          #  fc: nvfortran
          #  container: seissol/gha-gpu-nvhpc:davschneller-gpu-image
    env:
      cc: ${{matrix.setup.cc}}
      cxx: ${{matrix.setup.cxx}}
      fc: ${{matrix.setup.fc}}
      hostarch: ${{matrix.arch}}
      buildtype: ${{matrix.build_type}}
      tests: ON
      devicearch: none
      devicebackend: none
    steps:
      - id: checkout
        name: checkout-seissol
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/seissol-build
        name: elastic-d-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: elastic
          cfg-mechanisms: 0
          cfg-precision: double
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: viscoelastic-3-d-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: viscoelastic2
          cfg-mechanisms: 3
          cfg-precision: double
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: poroelastic-d-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: poroelastic
          cfg-mechanisms: 0
          cfg-precision: double
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: anisotropic-d-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: anisotropic
          cfg-mechanisms: 0
          cfg-precision: double
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: acoustic-d-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: acoustic
          cfg-mechanisms: 0
          cfg-precision: double
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: elastic-d-p6-f8
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: elastic
          cfg-mechanisms: 0
          cfg-precision: double
          cfg-simulations: 8

      - uses: ./.github/actions/seissol-build
        name: elastic-s-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: elastic
          cfg-mechanisms: 0
          cfg-precision: single
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: viscoelastic-3-s-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: viscoelastic2
          cfg-mechanisms: 3
          cfg-precision: single
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: poroelastic-s-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: poroelastic
          cfg-mechanisms: 0
          cfg-precision: single
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: anisotropic-s-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: anisotropic
          cfg-mechanisms: 0
          cfg-precision: single
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: acoustic-s-p6
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: acoustic
          cfg-mechanisms: 0
          cfg-precision: single
          cfg-simulations: 1

      - uses: ./.github/actions/seissol-build
        name: elastic-s-p6-f8
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          cfg-order: 6
          cfg-equation: elastic
          cfg-mechanisms: 0
          cfg-precision: single
          cfg-simulations: 8

      - name: upload-seissol
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' }}
        with:
          name: seissol-${{matrix.build_type}}-${{matrix.arch}}-${{matrix.setup.name}}
          path: /opt/seissol

  # ---------------------------------------------------------------------------
  # Per (case, precision) × (compiler) × (parallel mode): run SeisSol and
  # verify against the precomputed reference. All five compare-* dispatches
  # plus the run itself live inside verify.py now; tpv-data.json controls
  # which categories actually fire per case.
  # ---------------------------------------------------------------------------
  seissol-run-test:
    name: seissol-run-test
    runs-on: ubuntu-24.04
    container: ${{ matrix.setup.container }}
    continue-on-error: true
    needs: [compute-cases, seissol-build-test]
    if: ${{ github.repository == 'SeisSol/SeisSol' && github.ref_name == 'master' }}
    strategy:
      fail-fast: false
      matrix:
        case: ${{ fromJSON(needs.compute-cases.outputs.cases) }}
        order:
          - 6
        arch:
          - hsw
        build_type:
          - Release
        setup:
          - cc: gcc-13
            cxx: g++-13
            fc: gfortran-13
            container: seissol/gha-cpu:davschneller-gpu-image
            pythonbreak: true
            ompi: true
            name: gcc-13
          - cc: clang-19
            cxx: clang++-19
            fc: gfortran-13 # TODO?
            container: seissol/gha-cpu:davschneller-gpu-image
            pythonbreak: true
            ompi: true
            name: clang-19
          - cc: icx
            cxx: icpx
            fc: ifx
            container: seissol/gha-gpu-intel:davschneller-gpu-image
            pythonbreak: false
            ompi: false
            name: icx-2024
          #- cc: nvc
          #  cxx: nvc++
          #  fc: nvfortran
          #  container: seissol/gha-gpu-nvhpc:davschneller-gpu-image
          #  pythonbreak: true
          #  ompi: true
        parallel:
          - ranks: 1
            threads: 4
            commthread: false
          - ranks: 4
            threads: 1
            commthread: false
    env:
      commsize: ${{matrix.parallel.ranks}}
      rankthreads: ${{matrix.parallel.threads}}
      ompi: ${{matrix.setup.ompi}}
      device: 'cpu'
    steps:
      - name: install-packages
        run: |
          # circumvent problems with the Intel image still using Ubuntu 22.04
          if [ "${{ matrix.setup.pythonbreak }}" = true ]; then
            pip3 install --break-system-packages numpy>=1.12.0 lxml==5.0.0 setuptools seissolxdmf pandas jq
          else
            pip3 install numpy>=1.12.0 lxml==5.0.0 setuptools seissolxdmf pandas jq
          fi

      - name: get-precomputed-solutions
        uses: actions/checkout@v6
        with:
          repository: seissol/precomputed-seissol
          ref: ${{ env.precomputed-hash }}
          path: precomputed

      - name: get-seissol
        uses: actions/download-artifact@v5
        with:
          name: seissol-${{ matrix.build_type }}-${{ matrix.case.precision }}-${{ matrix.arch }}-${{ matrix.order }}-${{ matrix.case.equation }}-${{ matrix.case.multisim }}-${{ matrix.setup.cc }}
          path: install

      # The compare-*.py / verify.py scripts live in this very repo. The
      # workflow itself doesn't auto-checkout, so we do it explicitly here.
      - name: get-verification-scripts
        uses: actions/checkout@v6

      - name: get-seissol
        id: get-seissol
        uses: actions/download-artifact@v5
        with:
          name: seissol-${{matrix.build_type}}-${{matrix.arch}}-${{matrix.setup.name}}
          path: install

      - name: verify
        id: verify
        run: |
          if [ ${{ matrix.setup.mpi }} = openmpi ]; then
            MPI_OPTIONS="--oversubscribe --allow-run-as-root -bind-to none"
          elif [ ${{ matrix.setup.mpi }} = intel ]; then
            MPI_OPTIONS=""
          fi

          export PATH=$(pwd)/install/bin:$PATH
          export LD_LIBRARY_PATH=$(pwd)/install/lib:$(pwd)/install/lib64:${LD_LIBRARY_PATH:-}
          chmod +x $(pwd)/install/bin/*

          export OMP_NUM_THREADS=${{ matrix.parallel.threads }}
          export SEISSOL_COMMTHREAD=${{ matrix.parallel.commthread }}
          export SEISSOL_MINI_NUM_ELEMENTS=100

          python3 $GITHUB_WORKSPACE/scripts/postprocessing/validation/verify.py \
            --precomputed-dir precomputed \
            --binary-dir install \
            --variant cpu \
            --case ${{ matrix.case.name }}/${{ matrix.case.precision }} \
            --mpi-cmd mpirun \
            --mpi-args "${MPI_OPTIONS}" \
            --ranks ${{ matrix.parallel.ranks }} \
            --threads ${{ matrix.parallel.threads }} \
            --color always \
            --report report.txt

      - name: upload-report
        if: ${{ !cancelled() && steps.verify.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.case.name }}-${{ matrix.case.precision }}-${{ matrix.setup.cc }}-r${{ matrix.parallel.ranks }}t${{ matrix.parallel.threads }}
          path: |
            report.txt
            precomputed/${{ matrix.case.name }}/output/
          if-no-files-found: ignore
          retention-days: 14
